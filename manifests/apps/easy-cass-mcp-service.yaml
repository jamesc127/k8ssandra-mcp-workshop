apiVersion: v1
kind: Service
metadata:
  name: easy-cass-mcp
  namespace: default
  labels:
    app: easy-cass-mcp
  annotations:
    # Required for internet-facing NLB on EKS
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: easy-cass-mcp
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: LoadBalancer
